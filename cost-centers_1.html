<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cost Centers">
<title>Jefferson Cost Centers</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #12151b;
    --surface2: #1a1e28;
    --border: #252a38;
    --accent: #4f8ef7;
    --accent2: #64c8a0;
    --accent3: #f0a050;
    --text: #e8ecf4;
    --muted: #6b7590;
    --tag-bg: #1e2436;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100dvh;
    padding-bottom: 40px;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10, 12, 16, 0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 10px;
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .logo {
    width: 32px;
    height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 13px;
    color: #fff;
    flex-shrink: 0;
  }

  h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--text);
  }

  .subtitle {
    font-size: 11px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    margin-top: 1px;
  }

  .search-wrap {
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.4;
    pointer-events: none;
  }

  input[type="search"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px 8px 34px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
  }

  input[type="search"]:focus { border-color: var(--accent); }
  input[type="search"]::placeholder { color: var(--muted); }

  .filters {
    display: flex;
    gap: 6px;
    padding: 10px 16px;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 1px solid var(--border);
  }

  .filters::-webkit-scrollbar { display: none; }

  .filter-btn {
    flex-shrink: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'IBM Plex Sans', sans-serif;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .results-count {
    font-size: 11px;
    color: var(--muted);
    padding: 8px 16px 4px;
    font-family: 'IBM Plex Mono', monospace;
  }

  .section {
    margin-bottom: 4px;
  }

  .section-header {
    padding: 10px 16px 6px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-family: 'IBM Plex Mono', monospace;
    position: sticky;
    top: 109px;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-header::before {
    content: '';
    display: block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .section-tjuh .section-header { color: var(--accent); background: rgba(10,12,16,0.95); }
  .section-tjuh .section-header::before { background: var(--accent); }

  .section-jmh .section-header { color: var(--accent2); background: rgba(10,12,16,0.95); }
  .section-jmh .section-header::before { background: var(--accent2); }

  .section-jeph .section-header { color: var(--accent3); background: rgba(10,12,16,0.95); }
  .section-jeph .section-header::before { background: var(--accent3); }

  .cards {
    padding: 0 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
  }

  .card:active { background: var(--surface2); transform: scale(0.99); }

  .section-tjuh .card { border-left: 3px solid rgba(79,142,247,0.4); }
  .section-jmh .card { border-left: 3px solid rgba(100,200,160,0.4); }
  .section-jeph .card { border-left: 3px solid rgba(240,160,80,0.4); }

  .card-name {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.35;
    flex: 1;
    min-width: 0;
  }

  .card-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    flex-shrink: 0;
  }

  .cc-number {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }

  .section-tjuh .cc-number { color: var(--accent); }
  .section-jmh .cc-number { color: var(--accent2); }
  .section-jeph .cc-number { color: var(--accent3); }

  .ou-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    background: var(--tag-bg);
    padding: 2px 6px;
    border-radius: 4px;
  }

  .copy-flash {
    position: absolute;
    inset: 0;
    background: rgba(79,142,247,0.12);
    border-radius: inherit;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.1s;
  }

  .copy-flash.show { opacity: 1; }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 24px;
    font-size: 13px;
    font-weight: 500;
    z-index: 999;
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap;
    pointer-events: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  .empty {
    text-align: center;
    padding: 48px 24px;
    color: var(--muted);
    font-size: 14px;
    display: none;
  }

  .empty.show { display: block; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">JH</div>
    <div>
      <div class="header-title" style="font-size:15px;font-weight:600;">Cost Centers</div>
      <div class="subtitle">Jefferson Health · Tap to copy CC#</div>
    </div>
  </div>
  <div class="search-wrap">
    <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="search" id="searchInput" placeholder="Search unit name or CC#…" autocomplete="off">
  </div>
</header>

<div class="filters" id="filters">
  <button class="filter-btn active" data-filter="all">All Units</button>
  <button class="filter-btn" data-filter="tjuh">TJUH</button>
  <button class="filter-btn" data-filter="jmh">JMH</button>
  <button class="filter-btn" data-filter="jeph">JEPH</button>
</div>

<div class="results-count" id="resultsCount"></div>

<div id="content"></div>
<div class="empty" id="empty">No units found</div>

<div class="toast" id="toast"></div>

<script>
const data = {
  tjuh: {
    label: "TJUH — Thomas Jefferson University Hospital",
    ou: 209,
    units: [
      { name: "10 Pavilion Clinical Decision", cc: "101065" },
      { name: "10 Thompson Medical", cc: "101090" },
      { name: "12 Thompson Med/Surg", cc: "107252" },
      { name: "13 Pavilion Surgical", cc: "101092" },
      { name: "3C Gibbon Medical Telemetry", cc: "101056" },
      { name: "3W Gibbon Oncology", cc: "101054" },
      { name: "4 East Main Surge", cc: "101103" },
      { name: "7C Gibbon Med/Surg Trauma", cc: "101061" },
      { name: "7SE Gibbon Observation", cc: "101238" },
      { name: "7W Gibbon Med/Surg/Tele", cc: "101057" },
      { name: "9 Thompson Med/Surg", cc: "101117" },
      { name: "9C Gibbon Med/Surg", cc: "101082" },
      { name: "9W Gibbon/9 Pavilion Orthopedic", cc: "101071" },
    ]
  },
  jmh: {
    label: "JMH — Jefferson Methodist Hospital",
    ou: 250,
    units: [
      { name: "B1 ACE Med/Surg", cc: "101394" },
      { name: "B2 Surgical", cc: "101419" },
      { name: "B3 Surgical", cc: "101390" },
      { name: "B4 Med/Surg", cc: "101384" },
      { name: "B5 Med/Surg", cc: "101386" },
      { name: "B6 Headache Center", cc: "101387" },
    ]
  },
  jeph: {
    label: "JEPH — Jefferson Einstein Philadelphia",
    ou: 610,
    units: [
      { name: "4 Levy Medical Surgical Telemetry", cc: "107357" },
      { name: "4 Tower Ortho/Trauma/Joint", cc: "100243" },
      { name: "5 Tower N/S Telemetry", cc: "100238" },
      { name: "5E Levy Neuroscience Unit", cc: "100262" },
      { name: "6 Tower Med/Surg", cc: "100240" },
      { name: "7 Levy Medical/Hepatology", cc: "100253" },
      { name: "8 Tower Oncology Transplant", cc: "100255" },
      { name: "Medical Surgical Observation Unit", cc: "100256" },
    ]
  }
};

let activeFilter = 'all';
let searchTerm = '';

function render() {
  const content = document.getElementById('content');
  content.innerHTML = '';
  let total = 0;

  const keys = activeFilter === 'all' ? ['tjuh','jmh','jeph'] : [activeFilter];

  keys.forEach(key => {
    const group = data[key];
    const filtered = group.units.filter(u => {
      const q = searchTerm.toLowerCase();
      return !q || u.name.toLowerCase().includes(q) || u.cc.includes(q) || key.includes(q);
    });

    if (!filtered.length) return;
    total += filtered.length;

    const section = document.createElement('div');
    section.className = `section section-${key}`;

    const hdr = document.createElement('div');
    hdr.className = 'section-header';
    hdr.textContent = group.label;
    section.appendChild(hdr);

    const cards = document.createElement('div');
    cards.className = 'cards';

    filtered.forEach(u => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-name">${key.toUpperCase()} ${u.name}</div>
        <div class="card-right">
          <div class="cc-number">${u.cc}</div>
          <div class="ou-badge">OU ${group.ou}</div>
        </div>
        <div class="copy-flash"></div>
      `;
      card.addEventListener('click', () => {
        navigator.clipboard.writeText(u.cc).catch(()=>{});
        const flash = card.querySelector('.copy-flash');
        flash.classList.add('show');
        setTimeout(() => flash.classList.remove('show'), 300);
        showToast(`Copied ${u.cc}`);
      });
      cards.appendChild(card);
    });

    section.appendChild(cards);
    content.appendChild(section);
  });

  document.getElementById('resultsCount').textContent = `${total} unit${total !== 1 ? 's' : ''}`;
  document.getElementById('empty').classList.toggle('show', total === 0);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 1800);
}

document.getElementById('searchInput').addEventListener('input', e => {
  searchTerm = e.target.value;
  render();
});

document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  activeFilter = btn.dataset.filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b === btn));
  render();
});

render();
</script>
</body>
</html>
